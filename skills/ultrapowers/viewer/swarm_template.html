<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ULTRAPOWERS — swarm monitor</title>
<style>
  :root{
    /* palette + knobs are set from THEME at startup; these are fallbacks */
    --bg:#07080a; --screen-bg:radial-gradient(ellipse at 50% 48%,#101113 0%,#07080a 62%,#020203 100%);
    --ink:#f5f6f0; --bright:#ffffff; --dim:#5a5d58; --faint:#2a2c2a;
    --accent:#ffb347; --hud:#8a8d85; --agent:#ffffff; --hub-core:var(--bright);
    --font:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --edge-w:1; --edge-w-live:1.6; --screen-radius:26px;
    --scan-o:0; --vig-o:0; --glass-o:0; --grain-o:0; --dots-o:0; --flick:transparent;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;display:grid;place-items:center;font-family:var(--font);background:#101012}
  .screen{position:relative;width:min(92vw,960px);aspect-ratio:4/3;overflow:hidden;
          border-radius:var(--screen-radius);background:var(--screen-bg)}
  svg{position:absolute;inset:0;width:100%;height:100%}

  /* frames */
  body[data-frame=crt]{background:#0b0b0d}
  body[data-frame=crt] .bezel{padding:30px 34px;border-radius:36px;
    background:linear-gradient(150deg,#202125,#0b0c0e 60%,#141518);
    box-shadow:0 22px 70px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,255,255,.06)}
  body[data-frame=crt] .screen{box-shadow:inset 0 0 80px rgba(0,0,0,.85)}
  body[data-frame=mat]{background:#d8d3c8}
  body[data-frame=mat] .bezel{padding:44px;border-radius:4px;background:#fdfcf9;
    border:1px solid #e4dfd3;box-shadow:0 20px 55px rgba(40,34,24,.25)}
  body[data-frame=mat] .screen{border-radius:2px}
  body[data-frame=panel]{background:#b9b6ad}
  body[data-frame=panel] .bezel{padding:26px;border-radius:16px;
    background:linear-gradient(#f0eee8,#d6d3ca);
    box-shadow:0 16px 44px rgba(30,30,25,.4), inset 0 1px 0 rgba(255,255,255,.7)}
  body[data-frame=panel] .screen{border-radius:8px;
    box-shadow:inset 0 2px 8px rgba(30,30,25,.28)}
  body[data-frame=none]{background:var(--bg)}
  body[data-frame=none] .bezel{padding:0}
  body[data-frame=none] .screen{width:min(96vw,1040px);border-radius:0}

  /* optical overlays (each theme dials these via opacity vars) */
  .ovl{position:absolute;inset:0;pointer-events:none}
  .scanlines{opacity:var(--scan-o);mix-blend-mode:multiply;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.5) 0 1px,transparent 1px 3px)}
  .vignette{opacity:var(--vig-o);
    background:radial-gradient(ellipse at center,transparent 52%,rgba(0,0,0,.42) 88%,rgba(0,0,0,.72) 100%)}
  .glass{opacity:var(--glass-o);
    background:radial-gradient(ellipse at 30% 18%,rgba(235,255,245,.06),transparent 55%)}
  .grain{opacity:var(--grain-o);mix-blend-mode:multiply;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/></filter><rect width="160" height="160" filter="url(%23n)" opacity="0.55"/></svg>')}
  .dots{opacity:var(--dots-o);
    background-image:radial-gradient(currentColor 1.2px,transparent 1.3px);
    background-size:26px 26px;color:var(--faint)}
  .flicker{background:var(--flick);opacity:0;animation:flick 3.7s infinite}
  @keyframes flick{0%,93%,100%{opacity:0} 94%{opacity:.012} 95%{opacity:.03} 96%{opacity:.008}}

  .brand{position:absolute;top:16px;right:20px;color:var(--hud);
         font-size:11px;font-weight:600;letter-spacing:.46em;user-select:none}
  .hud{position:absolute;top:14px;left:20px;color:var(--hud);font-size:11px;
       letter-spacing:.18em;line-height:1.9}
  .hud .mode{color:var(--ink)}
  .hud .mode.lost{color:var(--accent);animation:lostblink 1.4s steps(2) infinite}
  @keyframes lostblink{50%{opacity:.35}}
  .legend{position:absolute;bottom:12px;left:20px;color:var(--hud);opacity:.8;
          font-size:9.5px;letter-spacing:.22em;user-select:none}
  .ticker{position:absolute;bottom:12px;right:20px;color:var(--hud);font-size:9.5px;
          letter-spacing:.12em;max-width:46%;overflow:hidden;white-space:nowrap;
          text-overflow:ellipsis;text-align:right}

  /* station state grammar: position is fixed by the grid; state changes color
     and opacity only. Each station group carries its wave color via inline `color`. */
  .stationG{color:var(--ink)}
  .node{fill:var(--bg);stroke:currentColor;stroke-width:1.6;opacity:.32;transition:opacity .5s,fill .5s}
  .core{fill:none;opacity:0;transition:opacity .5s}
  [data-state=working] .node{opacity:1}
  [data-state=working] .core{fill:var(--accent);opacity:1}
  [data-state=implementing] .node{opacity:1}
  [data-state=implementing] .core{fill:var(--accent);opacity:1}
  [data-state=under-review] .node{opacity:1;stroke-dasharray:3 3}
  [data-state=under-review] .core{fill:var(--hud);opacity:1}
  [data-state=fixing] .node{opacity:1}
  [data-state=fixing] .core{fill:var(--accent);opacity:1;animation:lostblink 1.4s steps(2) infinite}
  [data-state=committed] .node{opacity:1}
  [data-state=committed] .core{fill:currentColor;opacity:1}
  [data-state=merged] .node{opacity:.7}
  [data-state=merged] .core{fill:var(--accent);opacity:.9}
  [data-state=stalled] .node{stroke:var(--accent);opacity:1;animation:lostblink 1.1s steps(2) infinite}
  .stlabel{fill:currentColor;opacity:.55;font-family:var(--font);font-size:11px;
           letter-spacing:.12em;text-anchor:middle;transition:opacity .5s}
  [data-state=working] .stlabel,[data-state=committed] .stlabel{opacity:1}
  [data-state=implementing] .stlabel,[data-state=under-review] .stlabel,[data-state=fixing] .stlabel{opacity:1}
  .edge{fill:none;stroke:var(--dim);opacity:.34;stroke-width:var(--edge-w);transition:opacity .5s}
  .edge.live{opacity:.95;stroke-width:var(--edge-w-live)}
  .stationG.clickable{cursor:pointer}

  /* fractal-zoom camera: macro grid ↔ meso git-graph (transform/opacity only) */
  .crumbs{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:15;
    color:var(--hud);font-family:var(--font);font-size:10px;letter-spacing:.16em}
  .crumbs button{background:none;border:none;color:var(--hud);cursor:pointer;font:inherit;padding:0 2px}
  .crumbs button[aria-current=true]{color:var(--ink)}
  #scene{transition:transform .6s ease-in-out,opacity .6s ease-in-out;transform-origin:50% 50%}
  #scene.zoomed{opacity:0;pointer-events:none}
  .meso-layer[hidden]{display:none}
  .meso-trunk{stroke:var(--ink);stroke-width:2;opacity:.5}
  .meso-branch{stroke:var(--dim);stroke-width:1.6;fill:none;opacity:.8}
  .meso-commit{fill:var(--bg);stroke:currentColor;stroke-width:1.6;cursor:pointer}
  .meso-commit.fix{stroke-dasharray:3 2}
  .meso-gate{fill:none;stroke:var(--hud);stroke-width:1.4;cursor:pointer}
  .meso-merge{fill:var(--accent)}
  .meso-label{fill:var(--ink);font-family:var(--font);font-size:10px}
  @media (prefers-reduced-motion:reduce){ #scene{transition:none} }

  @media (prefers-reduced-motion:reduce){ .flicker{display:none} }

  .layout{position:absolute;inset:0;display:grid;grid-template-columns:58% 42%}
  .stage-pane{position:relative;overflow:hidden}
  .stage-pane svg{position:absolute;inset:0;width:100%;height:100%}
  .sidebar{position:relative;display:flex;flex-direction:column;gap:8px;
    padding:14px 14px 12px;border-left:1px solid var(--faint);overflow:hidden;
    color:var(--ink);font-family:var(--font);font-size:11px;background:var(--bg)}
  .readout{white-space:pre-wrap;line-height:1.5;letter-spacing:.04em;overflow:auto;max-height:42%}
  .readout .wave{color:var(--hud);letter-spacing:.18em}
  .readout .t{color:var(--ink)} .readout .t.dim{opacity:.5}
  .feed{list-style:none;margin:0;padding:0;overflow:auto;flex:1;
    border-top:1px solid var(--faint)}
  .feed li{padding:2px 0;cursor:pointer;color:var(--hud);
    font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  @media (hover:hover){ .feed li:hover{color:var(--ink)} }
  .feed li .ts{opacity:.6;margin-right:6px}
  .transcript{display:flex;flex-direction:column;min-height:0;flex:2;
    border-top:1px solid var(--faint)}
  .transcript[hidden]{display:none}
  .tx-head{display:flex;align-items:center;gap:8px;padding:4px 0}
  .tx-title{flex:1;opacity:.85;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tx-x{background:none;border:1px solid var(--dim);color:var(--hud);border-radius:4px;
    cursor:pointer;font:inherit;font-size:10px;padding:1px 6px}
  .tx-body{overflow:auto;flex:1;line-height:1.45}
  .tx-body .ev{margin:4px 0} .tx-body .ev-head{white-space:pre-wrap}
  .tx-body .ev-tool_result .ev-head{opacity:.8}
  .tx-body pre.ev-full{white-space:pre-wrap;margin:4px 0 8px;padding:6px 8px;
    background:rgba(127,127,127,.12);border-radius:6px;max-height:40vh;overflow:auto}
  .tx-foot{padding:4px 0;font-size:10px;opacity:.6}
</style>
</head>
<body data-frame="crt">
<div class="bezel"><div class="screen" id="screen">
  <div class="layout">
    <div class="stage-pane">
      <svg id="stage" viewBox="0 0 960 720" aria-label="ultrapowers agent swarm">
        <defs>
          <filter id="bloom" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b1"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b2"/>
            <feMerge>
              <feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <filter id="bloomSoft" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="s1"/>
            <feMerge><feMergeNode in="s1"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <g id="scene">
          <g id="edges"></g>
          <g id="stations"></g>
          <g id="sink"></g>
        </g>
        <g id="meso" class="meso-layer" hidden></g>
      </svg>
      <div class="ovl dots"></div>
      <div class="ovl scanlines"></div>
      <div class="ovl vignette"></div>
      <div class="ovl glass"></div>
      <div class="ovl grain"></div>
      <div class="ovl flicker"></div>
      <div class="brand">ULTRAPOWERS</div>
      <div class="hud">
        <div id="hudTitle"></div>
        <div><span id="hudWave"></span> <span id="hudMode" class="mode">WAITING</span></div>
      </div>
      <div class="legend">OBSERVING = STATION STATE FROM GIT</div>
      <div class="ticker" id="ticker"></div>
      <div id="crumbs" class="crumbs" aria-label="zoom breadcrumb"></div>
    </div>
    <aside class="sidebar" id="sidebar">
      <div id="readout" class="readout"></div>
      <ul id="feed" class="feed" aria-label="cross-agent activity feed"></ul>
      <section id="transcript" class="transcript" hidden>
        <div class="tx-head"><span id="txTitle" class="tx-title"></span>
          <button id="txClose" class="tx-x" type="button">esc ✕</button></div>
        <div id="txBody" class="tx-body"></div>
        <div id="txFoot" class="tx-foot"></div>
      </section>
    </aside>
  </div>
</div></div>
<script>
'use strict';
// ─── injected by render_viewer.py ───────────────────────────────────────────
const DAG = /*__DAG_JSON__*/null;
const THEME = /*__THEME_JSON__*/null || {
  name: 'asteroids', frame: 'crt',
  waveColors: ['#f5f6f0'],
  vars: { bg: '#07080a', ink: '#f5f6f0', bright: '#ffffff', dim: '#5a5d58',
          faint: '#2a2c2a', accent: '#ffb347', hud: '#8a8d85', agent: '#ffffff',
          'screen-bg': 'radial-gradient(ellipse at 50% 48%,#101113 0%,#07080a 62%,#020203 100%)',
          'scan-o': '.18', 'vig-o': '1', 'glass-o': '1', 'flick': '#eef7f0' },
};
/*__AUDIT_JS__*/
/*__D3DAG_JS__*/
/*__D3ZOOM_JS__*/
/*__SWARM_LAYOUT_JS__*/
/*__SWARM_ZOOM_JS__*/
const AUDIT_INDEX = /*__AUDIT_INDEX__*/null;
const AUDIT_EMBED = /*__AUDIT_EMBED__*/null;

const audit = AuditProjection.partitionAgents(AUDIT_INDEX);

let liveTimer = null, liveAgentId = null, liveSig = null;

function txEls() {
  return {
    root: document.getElementById("transcript"),
    title: document.getElementById("txTitle"),
    body: document.getElementById("txBody"),
    foot: document.getElementById("txFoot"),
  };
}
function roleLabel(a) { return a.task != null ? (a.role + ":" + a.task) : a.role; }
function mkEl(tag, cls, text) { return AuditProjection.makeEl(document, tag, cls, text); }
function stopLive() { if (liveTimer) { clearInterval(liveTimer); liveTimer = null; } liveAgentId = null; }
function closeTranscript() { stopLive(); txEls().root.hidden = true; }
document.getElementById("txClose").addEventListener("click", closeTranscript);
document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeTranscript(); });

function focusAgent(agents, label) {
  if (!audit || !agents || !agents.length) return;
  txEls().root.hidden = false;
  loadAgent(agents[0], label);
}

function loadAgent(a, label) {
  stopLive();
  const d = txEls();
  d.title.textContent = (label ? label + " · " : "") + roleLabel(a) +
    " · " + (a.model || "?") + " · " + a.turns + " turns";
  d.body.textContent = "loading…";
  if (AUDIT_EMBED && AUDIT_EMBED[a.id]) {
    const ev = AuditProjection.projectAgent(AUDIT_EMBED[a.id]).events;
    renderEvents(ev, d, (AUDIT_INDEX.versions || []), 0);
  } else if (location.protocol === "file:") {
    d.body.textContent = "Serve this folder over http for live transcripts, or re-render with --embed for offline content.";
    d.foot.textContent = "";
  } else {
    liveAgentId = a.id;
    liveSig = null;
    fetchAndRender(a, d, false);
    liveTimer = setInterval(function () { if (liveAgentId === a.id) fetchAndRender(a, d, true); }, 2000);
  }
}

function fetchAndRender(a, d, quiet) {
  fetch("./" + a.file, { cache: "no-store" })
    .then(function (r) { return r.ok ? r.text() : Promise.reject(r.status); })
    .then(function (text) {
      const decision = AuditProjection.shouldRerender(liveSig, text);
      liveSig = decision.sig;
      if (!decision.render) return;   // unchanged since last paint: keep expand + scroll
      const p = AuditProjection.parseLines(text);
      renderEvents(AuditProjection.projectAgent(p.entries).events, d, p.versions, p.unparsed);
    })
    .catch(function (err) { if (!quiet) d.body.textContent = "could not load " + a.file + " (" + err + ")"; });
}

function renderEvents(events, d, versions, unparsed) {
  AuditProjection.renderInto(document, d.body, d.foot, events, versions, unparsed);
}

// ─────────────────────────────────────────────────────────────────────────────
// The grid is static: positions are prefigured from the compiled DAG, so a
// station's "alive" feel comes from the CSS state grammar, not motion. The only
// time-driven work left is the HUD age/mode badge, refreshed by the
// one requestAnimationFrame loop at the bottom of this file.

const SVGNS = 'http://www.w3.org/2000/svg';
const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

// apply the theme
document.body.dataset.frame = THEME.frame;
document.body.dataset.theme = THEME.name;
for (const k in THEME.vars)
  document.documentElement.style.setProperty('--' + k, THEME.vars[k]);
const scene = document.getElementById('scene');
scene.setAttribute('filter', 'url(#bloom)');   // phosphor glow on the whole grid

function el(tag, attrs, parent) {
  const node = document.createElementNS(SVGNS, tag);
  for (const k in attrs) node.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(node);
  return node;
}
// ─── grid layout: positions are prefigured from the compiled DAG ────────────
const waves = DAG.waves;
const nW = waves.length;
const taskWave = {};
waves.forEach((wave, wi) => wave.forEach(id => { taskWave[String(id)] = wi; }));
const waveColor = w => THEME.waveColors[w % THEME.waveColors.length];

const gEdges = document.getElementById('edges');
const gStations = document.getElementById('stations');
const gSink = document.getElementById('sink');

const grid = SwarmLayout.computeGrid(DAG, d3);
document.getElementById('stage').setAttribute('viewBox', `0 0 ${grid.width} ${grid.height}`);
const posById = {};
grid.nodes.forEach(n => { posById[String(n.id)] = n; });

// edges (routed polylines from the grid)
grid.edges.forEach(e => {
  const d = 'M ' + e.points.map(p => p[0] + ' ' + p[1]).join(' L ');
  el('path', { class: 'edge', d, 'data-from': e.from, 'data-to': e.to }, gEdges);
});

// stations: one per task, placed at the grid coordinate
const stations = {};
DAG.tasks.forEach(t => {
  const id = String(t.id), p = posById[id];
  if (!p) return;
  const wi = taskWave[id] || 0;
  const g = el('g', { class: 'stationG', 'data-state': 'pending',
    transform: `translate(${p.x} ${p.y})`, style: `color:${waveColor(wi)}` }, gStations);
  el('circle', { class: 'node', r: 11 }, g);
  el('circle', { class: 'core', r: 4.5 }, g);
  const label = el('text', { class: 'stlabel', y: 26 }, g);
  label.textContent = 'T' + t.id;
  stations[id] = { id, x: p.x, y: p.y, el: g, state: 'pending' };
  g.classList.add('clickable');
  g.setAttribute('tabindex', '0');
  g.setAttribute('role', 'button');
  g.addEventListener('click', () => zoomToStation(String(t.id), g));
  g.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); zoomToStation(String(t.id), g); } });
});

// the integration sink
const sink = posById[grid.sinkId];
if (sink) {
  const g = el('g', { class: 'stationG', transform: `translate(${sink.x} ${sink.y})`,
    style: 'color:var(--ink)' }, gSink);
  el('circle', { class: 'node', r: 14, style: 'opacity:.8' }, g);
  el('circle', { cx: 0, cy: 0, r: 5, fill: 'var(--hub-core)' }, g);
  const label = el('text', { class: 'stlabel', y: 30 }, g);
  label.textContent = 'INTEGRATION';
  if (audit && audit.runLevel.length) {
    g.classList.add('clickable');
    g.addEventListener('click', function () { focusAgent(audit.runLevel, 'run-level'); });
  }
}

// ─── state machine: recolor stations, light satisfied edges (no flights) ─────
const RANK = { pending: 0, implementing: 1, 'under-review': 2, fixing: 3,
               working: 1, committed: 4, merged: 5, stalled: 9 };
function setState(id, s) {
  const st = stations[String(id)];
  if (!st || st.state === s) return;
  if (s !== 'stalled' && RANK[s] < RANK[st.state]) return; // never downgrade
  st.state = s;
  st.el.dataset.state = s;
  if (s === 'committed' || s === 'merged') energizeEdges(String(id));
  updateHud();
}
function energizeEdges(fromId) {
  document.querySelectorAll('#edges .edge[data-from="' + fromId + '"]')
    .forEach(p => p.classList.add('live'));
}

// ─── observer: status.json written by swarm_watch.py (git is the truth) ─────
const hudMode = document.getElementById('hudMode');
const hudWave = document.getElementById('hudWave');
const hudTitle = document.getElementById('hudTitle');
const ticker = document.getElementById('ticker');
hudTitle.textContent = (DAG.title || 'WAVE PLAN').toUpperCase();

let lastOk = 0, everOk = false;
let lastStatus = {};       // freshest status.json (so renderMeso reads live commits[])
const seenBranches = {};   // branch -> last known mapping/state
function matchTask(text) {
  const n = (text || '').toLowerCase();
  for (const t of DAG.tasks) {
    const id = String(t.id).toLowerCase();
    for (const cand of ['task-' + id, 'task' + id, 't' + id, id]) {
      const re = new RegExp('(^|[^a-z0-9])' + cand.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '([^0-9]|$)');
      if (re.test(n)) return t.id;
    }
  }
  return null;
}
function gotStatus(s) {
  lastStatus = s;
  lastOk = Date.now();
  (s.branches || []).forEach(b => {
    const tid = matchTask(b.name + ' ' + (b.worktree || ''));
    if (tid) seenBranches[b.name] = { tid };
    if (!tid && !seenBranches[b.name]) return;
    const id = (seenBranches[b.name] || {}).tid;
    if (!id) return;
    if (b.merged) setState(id, 'merged');
    else if (b.ahead > 0) setState(id, 'committed');
    else setState(id, 'working');
  });
  // a branch that vanished while integration advanced was merged-and-swept
  const liveNames = new Set((s.branches || []).map(b => b.name));
  Object.keys(seenBranches).forEach(name => {
    if (!liveNames.has(name) && s.integration && s.integration.advanced)
      setState(seenBranches[name].tid, 'merged');
  });
  (s.worktrees || []).forEach(w => {
    const tid = matchTask((w.branch || '') + ' ' + w.path);
    if (tid) setState(tid, 'working');
  });
  if (s.integration && s.integration.last_subject)
    ticker.textContent = s.integration.last_subject.toUpperCase();
  updateHud();
}
async function poll() {
  try {
    const r = await fetch('status.json', { cache: 'no-store' });
    if (r.ok) { gotStatus(await r.json()); everOk = true; }
  } catch (e) { /* file:// or watcher not running: no run data yet */ }
  setTimeout(poll, 2000);
}
function updateHud() {
  let top = 0;
  Object.values(stations).forEach(st => {
    if (st.state !== 'pending') top = Math.max(top, taskWave[st.id] + 1);
  });
  hudWave.textContent = 'WAVE ' + Math.max(1, top) + '/' + nW;
  const age = Date.now() - lastOk;
  if (everOk && age < 8000) { hudMode.textContent = 'OBSERVING'; hudMode.className = 'mode'; }
  else if (everOk) { hudMode.textContent = 'SIGNAL LOST'; hudMode.className = 'mode lost'; }
  else { hudMode.textContent = 'WAITING'; hudMode.className = 'mode'; }
}
poll();

// ─── sidebar: ASCII wave readout + live cross-agent feed (agents.json) ───────
// The readout is the macro-level wave plan in text; the feed is the bounded
// recentEvents ring from swarm_watch's agents.json. Clicking a feed line (or a
// station) focuses that task's transcript in the #transcript region below.
const readoutEl = document.getElementById('readout');
const feedEl = document.getElementById('feed');
const agentsByTask = {};   // taskId -> [agent]   (from agents.json)
let agentsList = [];

function fmtTime(ts) {
  const d = new Date(ts * 1000);
  const p = n => String(n).padStart(2, '0');
  return p(d.getHours()) + ':' + p(d.getMinutes());
}
function renderReadout() {
  const lines = [];
  waves.forEach((wave, wi) => {
    lines.push('<div class="wave">━━ WAVE ' + (wi + 1) + ' ━━</div>');
    wave.forEach(id => {
      const st = stations[String(id)];
      const s = st ? st.state : 'pending';
      const dim = (s === 'pending') ? ' dim' : '';
      lines.push('<div class="t' + dim + '">  T' + id + ' · ' + s + '</div>');
    });
  });
  readoutEl.innerHTML = lines.join('');
}
function renderFeed(events) {
  feedEl.innerHTML = '';
  events.slice().reverse().forEach(ev => {
    const li = mkEl('li', null);
    const glyph = ev.kind === 'tool_use' ? '⚙' : ev.kind === 'tool_result' ? '→' : '●';
    li.innerHTML = '<span class="ts">' + fmtTime(ev.ts) + '</span>' +
      (ev.task != null ? 'T' + ev.task + ' ' : '') + glyph + ' ' +
      (ev.text || '').replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
    if (ev.task != null && agentsByTask[ev.task])
      li.addEventListener('click', () => focusAgent(agentsByTask[ev.task], 'T' + ev.task));
    feedEl.appendChild(li);
  });
}
function gotAgents(idx) {
  agentsList = idx.agents || [];
  for (const k in agentsByTask) delete agentsByTask[k];
  agentsList.forEach(a => {
    if (a.task != null) (agentsByTask[a.task] = agentsByTask[a.task] || []).push(a);
    // enrich station state from the active role on the task
    if (a.task != null && a.state === 'active') {
      if (a.role === 'review') setState(a.task, 'under-review');
      else if (a.role === 'impl' && a.iter > 0) setState(a.task, 'fixing');
      else if (a.role === 'impl') setState(a.task, 'implementing');
    }
  });
  renderFeed(idx.recentEvents || []);
  renderReadout();
}
async function pollAgents() {
  try {
    const r = await fetch('agents.json', { cache: 'no-store' });
    if (r.ok) gotAgents(await r.json());
  } catch (e) { /* file:// or no run yet: readout stays in its static state */ }
  setTimeout(pollAgents, 2000);
}
renderReadout();
pollAgents();

// ─── fractal zoom: macro grid ↔ meso git-graph ↔ micro transcript ───────────
// `scene` and `el()` are already defined above; the macro grid lives in #scene,
// the meso git-graph in #meso, and the micro transcript reuses the sidebar.
const zoom = SwarmZoom.create();
const mesoG = document.getElementById('meso');
const crumbsEl = document.getElementById('crumbs');
const stagePane = document.querySelector('.stage-pane');

function renderCrumbs() {
  crumbsEl.innerHTML = '';
  const cs = zoom.crumbs();
  cs.forEach((c, i) => {
    const b = mkEl('button', null, c.label);
    if (i === cs.length - 1) b.setAttribute('aria-current', 'true');
    b.addEventListener('click', () => { goTo(c.level, zoom.focus().task); });
    crumbsEl.appendChild(b);
    if (i < cs.length - 1) crumbsEl.appendChild(mkEl('span', null, ' › '));
  });
}
function clearMeso() { mesoG.innerHTML = ''; mesoG.hidden = true; }

function renderMeso(taskId) {
  // assemble from observed data: branch commits[] (status.json) + task agents (agents.json)
  const br = (lastStatus.branches || []).find(b => matchTask(b.name + ' ' + (b.worktree || '')) == taskId);
  const m = SwarmLayout.buildMeso({
    commits: (br && br.commits) || [],
    agents: (agentsByTask[taskId] || []).map(a => ({ role: a.role, iter: a.iter })),
    merged: !!(br && br.merged),
  });
  mesoG.innerHTML = '';
  document.getElementById('stage').setAttribute('viewBox', `0 0 ${m.width} ${m.height}`);
  el('line', { class: 'meso-trunk', x1: m.trunk.x, y1: m.trunk.y0, x2: m.trunk.x, y2: m.trunk.y1 }, mesoG);
  el('path', { class: 'meso-branch',
    d: `M ${m.trunk.x} ${m.fork.y} L ${m.branchX} ${m.fork.y}` +
       (m.merge ? ` M ${m.branchX} ${m.fork.y} L ${m.branchX} ${m.merge.y - 0} L ${m.trunk.x} ${m.merge.y}` : '') }, mesoG);
  m.commits.forEach(c => {
    const cl = 'meso-commit' + (c.role === 'fix' ? ' fix' : '');
    const node = el('circle', { class: cl, cx: c.x, cy: c.y, r: 8 }, mesoG);
    el('text', { class: 'meso-label', x: c.x + 14, y: c.y + 3 }, mesoG).textContent =
      c.sha + ' ' + (c.subject || '').slice(0, 28);
    node.addEventListener('click', ev => {
      ev.stopPropagation();
      const ags = agentsByTask[taskId] || [];
      const impl = ags.find(a => a.role === 'impl') || ags[0];
      if (impl) { zoom.toMicro(taskId, impl.id, 'T' + taskId); focusAgent([impl], 'T' + taskId); renderCrumbs(); }
    });
  });
  m.gates.forEach(g => {
    el('rect', { class: 'meso-gate', x: g.x - 7, y: g.y - 7, width: 14, height: 14, rx: 3 }, mesoG);
  });
  if (m.merge) el('circle', { class: 'meso-merge', cx: m.merge.x, cy: m.merge.y, r: 6 }, mesoG);
  mesoG.hidden = false;
}

function goTo(level, taskId) {
  if (level === 'macro') {
    zoom.reset(); closeTranscript(); clearMeso();
    scene.classList.remove('zoomed');
    document.getElementById('stage').setAttribute('viewBox', `0 0 ${grid.width} ${grid.height}`);
  } else if (level === 'meso') {
    zoom.toMeso(taskId); closeTranscript(); renderMeso(taskId);
    scene.classList.add('zoomed');
  }
  renderCrumbs();
}

function zoomToStation(taskId, node) {
  // camera origin at the clicked node so the fly-in emanates from it
  const r = node.getBBox ? node.getBBox() : null;
  if (r) scene.style.transformOrigin = (r.x + r.width / 2) + 'px ' + (r.y + r.height / 2) + 'px';
  goTo('meso', taskId);   // CSS .zoomed transition (or instant under reduced-motion) handles the rest
}

stagePane.addEventListener('click', e => { if (e.target === scene || e.target.tagName === 'svg') goTo('macro'); });
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (zoom.level() === 'macro') return;
  goTo(zoom.out() === 'macro' ? 'macro' : 'meso', zoom.focus().task);
});
renderCrumbs();

// optional: continuous wheel/pinch on the same scene transform (phase 3+).
if (!reduced && typeof d3 !== 'undefined' && d3.zoom) {
  try {
    const zb = d3.zoom().scaleExtent([1, 8]).on('zoom', ev => {
      scene.style.transform = 'translate(' + ev.transform.x + 'px,' + ev.transform.y +
        'px) scale(' + ev.transform.k + ')';
    });
    d3.select(document.getElementById('stage')).call(zb);
  } catch (e) { /* d3-zoom optional: never block the core click-to-zoom */ }
}

// ─── the beam: one frame loop refreshes the HUD clock ────────────────────────
// The grid is static, so a station's "alive" feel is CSS (the [data-state]
// grammar), not motion. Station state is driven entirely by observed git/agent
// data; this loop only keeps the HUD age/mode badge current.
function frame(ts) {
  if ((ts | 0) % 2000 < 20) updateHud();
  requestAnimationFrame(frame);
}
if (!reduced) requestAnimationFrame(frame);
else updateHud();
</script>
</body>
</html>
