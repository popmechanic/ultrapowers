[pytest]
# Scope the bare `pytest` (no args) invocation to the real test suites. Without
# this, collection from the repo root recurses into evals/fixtures/*/project/,
# which are intentionally-broken sample projects (missing deps like `textkit`,
# duplicate test basenames) used as eval *data* — they abort collection with 5
# errors that have nothing to do with the codebase.
#
# testpaths only applies when pytest is given no path args, so the eval
# framework's own targeted runs (e.g. `pytest tests/` with cwd inside a fixture,
# in score_run.py) are unaffected. No addopts/--ignore, to avoid leaking a flag
# into those nested runs.
testpaths = tests evals/scripts/tests
