name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pytest
        run: python -m pip install --quiet pytest

      - name: Validate skill
        run: python skills/ultrapowers/scripts/validate_skill.py skills/ultrapowers

      - name: Validate ultraplan skill
        run: python skills/ultrapowers/scripts/validate_skill.py skills/ultraplan

      - name: Run tests
        run: python -m pytest tests/ -v
